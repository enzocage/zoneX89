<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ZONE X</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/effects.css">
</head>
<body>
<canvas id="c"></canvas>
<input type="file" id="file-input" accept=".json">
<audio id="bg-music" loop preload="none"></audio>

<div id="start-screen">
  <div id="start-bg"></div>
  <div id=”start-center”>
    <div id=”start-logo”>ZONE X</div>
    <button id=”start-btn”>▶ STARTEN</button>
    <select id=”level-select”></select>
    <button id=”start-help-btn”>? SPIELINFO</button>
  </div>
  <div id=”start-info”>
    <div id=”start-info-header”>
      <div id=”start-info-title”>── SPIELINFO ──</div>
      <button id=”start-info-close”>✕</button>
    </div>
    <div id=”start-help-body”></div>
  </div>
</div>

<button id="tun-toggle" title="Tuning ein-/ausblenden">⚙</button>

<div id="tuning">
  <div class=”tun-title”>── TUNING ──</div>
</div>

<script src="js/levelData.js"></script>
<script src="js/config.js"></script>
<script src="js/audio.js"></script>
<script src="js/state.js"></script>
<script src="js/tuning.js"></script>
<script src="js/level.js"></script>
<script src="js/maze.js"></script>
<script src="js/player.js"></script>
<script src="js/enemies.js"></script>
<script src="js/doors.js"></script>
<script src="js/barrels.js"></script>
<script src="js/camera.js"></script>
<script src="js/lighting.js"></script>

<script src="js/sprites.js"></script>
<script src="js/postprocess.js"></script>
<script src="js/renderer.js"></script>
<script src="js/editor.js"></script>
<script src="js/input.js"></script>
<script src="js/levelManifest.js"></script>
<script src="js/main.js"></script>
</body>
</html>
